services:
  postgres:
    image: postgres:16-alpine
    container_name: timeline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timeline}
      POSTGRES_USER: ${POSTGRES_USER:-timeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timeline}
    volumes:
      - timeline_postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timeline} -d ${POSTGRES_DB:-timeline}"]
      interval: 5s
      timeout: 5s
      retries: 10

  timeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: timeline:local
    container_name: timeline-local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-timeline}
      POSTGRES_USER: ${POSTGRES_USER:-timeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timeline}

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: timeline-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5051}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - timeline_pgadmin:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  timeline_postgres:
  timeline_pgadmin:
