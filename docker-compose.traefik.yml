services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timeline}
      POSTGRES_USER: ${POSTGRES_USER:-timeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timeline_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timeline} -d ${POSTGRES_DB:-timeline}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  timeline:
    image: ${TIMELINE_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-timeline}
      POSTGRES_USER: ${POSTGRES_USER:-timeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traefik
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.timeline.rule=Host(`${TIMELINE_HOST}`)"
      - "traefik.http.routers.timeline.entrypoints=websecure"
      - "traefik.http.routers.timeline.tls=true"
      - "traefik.http.routers.timeline.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.timeline.loadbalancer.server.port=3000"

networks:
  traefik:
    external: true
  internal:
    internal: true

volumes:
  timeline_postgres:
